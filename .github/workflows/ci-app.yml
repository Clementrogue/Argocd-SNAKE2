name: CI - Snake App

# Ne se déclenche que sur les changements de l'application (lane Personne A)
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/ci-app.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/argocd-snake

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # pour committer le nouveau tag dans le repo GitOps
      packages: write   # pour pousser l'image sur GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Définir le tag (SHA court)
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Scan sécurité (Trivy) - Étape 5
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: "0"   # mettre "1" pour bloquer sur vulnérabilité

      # --- Mise à jour GitOps : on écrit UNIQUEMENT la ligne du tag ---
      # (évite les conflits de merge avec la lane Personne B)
      - name: Installer yq
        run: sudo snap install yq

      - name: Mettre à jour le tag dev + prod
        run: |
          yq -i '.image.tag = "${{ steps.meta.outputs.tag }}"' gitops/helm/snake/values-dev.yaml
          yq -i '.image.tag = "${{ steps.meta.outputs.tag }}"' gitops/helm/snake/values-prod.yaml

      - name: Commit & push (déclenche ArgoCD)
        run: |
          git config user.name  "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add gitops/helm/snake/values-dev.yaml gitops/helm/snake/values-prod.yaml
          if git diff --cached --quiet; then
            echo "Aucun changement de tag."
          else
            git commit -m "ci: déploie l'image ${{ steps.meta.outputs.tag }}"
            git push
          fi
