# Ce fichier est un EXEMPLE. On ne commit JAMAIS un Secret en clair.
# Génération réelle :
#   kubectl create secret generic snake-secret \
#     --from-literal=API_TOKEN=superSecret --dry-run=client -o yaml \
#   | kubeseal --format yaml > sealed-secret.yaml
#
# Le SealedSecret ci-dessous est chiffré : seul le controller du cluster
# peut le déchiffrer. Il est donc sûr de le versionner dans Git.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: snake-secret
  namespace: snake-prod
spec:
  encryptedData:
    API_TOKEN: AgB...REMPLACER_PAR_LA_VALEUR_CHIFFREE_kubeseal...
  template:
    metadata:
      name: snake-secret
      namespace: snake-prod
    type: Opaque
