apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: snake
  namespace: snake-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: snake
  template:
    metadata:
      labels:
        app: snake
    spec:
      containers:
        - name: snake
          image: ghcr.io/brubru-420/argocd-snake:prod-latest
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "v1"
            - name: APP_COLOR
              value: "#39ff14"
          readinessProbe:
            httpGet: { path: /readyz, port: 3000 }
            initialDelaySeconds: 3
            periodSeconds: 5
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 30 }   # observe 30s à 10% du trafic
        - setWeight: 50
        - pause: { duration: 30 }
        - setWeight: 100
