apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: snake-prod
spec:
  metrics:
    - name: success-rate
      interval: 30s
      count: 3
      successCondition: "result[0] >= 0.95"
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc:9090
          query: |
            sum(rate(http_requests_total{app="snake",code!~"5.."}[1m]))
            /
            sum(rate(http_requests_total{app="snake"}[1m]))
