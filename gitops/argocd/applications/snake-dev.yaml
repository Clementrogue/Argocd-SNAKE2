apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snake-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: snake
  source:
    repoURL: "https://github.com/Clementrogue/Argocd-SNAKE2.git"
    targetRevision: main
    path: gitops/helm/snake
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: snake-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
