{{- if not .Values.rollout.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snake
  labels:
    {{- include "snake.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "snake.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "snake.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        {{- include "snake.container" . | nindent 8 }}
{{- end }}
