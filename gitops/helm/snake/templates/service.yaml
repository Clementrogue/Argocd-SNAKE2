apiVersion: v1
kind: Service
metadata:
  name: snake
  labels:
    {{- include "snake.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "snake.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  type: ClusterIP
{{- if and .Values.rollout.enabled (eq .Values.rollout.strategy "blueGreen") }}
---
apiVersion: v1
kind: Service
metadata:
  name: snake-preview
  labels:
    {{- include "snake.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "snake.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  type: ClusterIP
{{- end }}
